  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }

c-9a3d-4be1-b792-c9ce42dda1fa\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root {\n    --paper: #ffffff;\n    --paper-2: #f4f6f9;\n    --card: #ffffff;\n    --ink: #0f1a2e;\n    --ink-2: #3a4a63;\n    --ink-3: #6b7a90;\n    --rule: #e1e6ee;\n    --orange: #ec5a1c;\n    --orange-dark: #c84416;\n    --navy: #1f3a6e;\n    --navy-dark: #14274d;\n    --sky: #7bb5d9;\n    --sky-light: #c8e0ee;\n    --hi-vis: #f5c842;\n  }\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n  html { scroll-behavior: smooth; }\n  body { background: var(--paper); color: var(--ink); font-family: \"Geist\", sans-serif; -webkit-font-smoothing: antialiased; line-height: 1.5; }\n  .display { font-family: \"Oswald\", sans-serif; font-weight: 600; letter-spacing: -0.005em; line-height: 0.95; text-transform: uppercase; }\n  .mono { font-family: \"Geist Mono\", monospace; }\n  a { color: inherit; text-decoration: none; }\n  img { max-width: 100%; display: block; }\n\n  /* ============ UTILITY STRIP ============ */\n  .utility { background: var(--navy-dark); color: #b8c5dd; font-size: 12px; padding: 9px 0; }\n  .utility .wrap { max-width: 1400px; margin: 0 auto; padding: 0 32px; display: flex; justify-content: space-between; align-items: center; gap: 24px; }\n  .utility .left, .utility .right { display: flex; gap: 24px; align-items: center; }\n  .utility .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--hi-vis); margin-right: 8px; vertical-align: middle; }\n  .utility .mono { letter-spacing: 0.05em; }\n  .utility a:hover { color: white; }\n\n  /* ============ NAV ============ */\n  .nav { background: var(--paper); border-bottom: 1px solid var(--rule); position: sticky; top: 0; z-index: 50; }\n  .nav .wrap { max-width: 1400px; margin: 0 auto; padding: 18px 32px; display: flex; align-items: center; gap: 40px; }\n  .logo { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }\n  .logo-mark { height: 48px; width: auto; flex-shrink: 0; display: block; }\n  .logo-text .name { font-family: \"Oswald\", sans-serif; font-size: 16px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; line-height: 1; color: var(--navy); }\n  .logo-text .sub { font-family: \"Geist Mono\", monospace; font-size: 10px; color: var(--ink-3); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; }\n  .nav-links { display: flex; gap: 4px; align-items: center; flex: 1; justify-content: center; }\n  .nav-links a { padding: 8px 14px; font-size: 14px; font-weight: 500; color: var(--ink); border-radius: 4px; transition: 0.15s; position: relative; }\n  .nav-links a:hover { background: var(--paper-2); }\n  .nav-links a.has-caret::after { content: \" ↓\"; font-size: 9px; opacity: 0.5; margin-left: 4px; }\n  .nav-cta { display: flex; gap: 10px; align-items: center; flex-shrink: 0; }\n  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: 4px; font-size: 13px; font-weight: 600; transition: 0.15s; cursor: pointer; border: 0; font-family: inherit; letter-spacing: 0.02em; }\n  .btn-primary { background: var(--orange); color: white; }\n  .btn-primary:hover { background: var(--orange-dark); }\n  .btn-ghost { background: transparent; color: var(--ink); border: 1px solid var(--ink); }\n  .btn-ghost:hover { background: var(--ink); color: var(--paper); }\n  .btn-dark { background: var(--ink); color: var(--paper); }\n  .btn-dark:hover { background: #2a241c; }\n\n  /* ============ HERO ============ */\n  .hero { padding: 72px 0 90px; border-bottom: 1px solid var(--rule); position: relative; overflow: hidden; }\n  .hero .wrap { max-width: 1400px; margin: 0 auto; padding: 0 32px; display: grid; grid-template-columns: 1.15fr 1fr; gap: 60px; align-items: center; }\n  .eyebrow { display: inline-flex; align-items: center; gap: 10px; font-family: \"Geist Mono\", monospace; font-size: 11px; color: var(--ink-3); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 24px; }\n  .eyebrow::before { content: \"\"; width: 28px; height: 1px; background: var(--orange); }\n  .hero h1 { font-family: \"Oswald\", sans-serif; font-weight: 600; font-size: clamp(48px, 7.2vw, 104px); line-height: 0.92; letter-spacing: -0.01em; text-transform: uppercase; color: var(--ink); }\n  .hero h1 .o { color: var(--orange); }\n  .hero h1 .stroke { -webkit-text-stroke: 1.5px var(--ink); color: transparent; }\n  .hero .lede { font-size: 18px; line-height: 1.55; color: var(--ink-2); max-width: 540px; margin-top: 28px; }\n  .hero .cta-row { display: flex; gap: 12px; margin-top: 36px; flex-wrap: wrap; }\n  .hero .cta-row .btn { padding: 14px 22px; font-size: 14px; }\n  .hero-meta { display: flex; gap: 28px; margin-top: 40px; padding-top: 28px; border-top: 1px solid var(--rule); }\n  .hero-meta .item { font-family: \"Geist Mono\", monospace; font-size: 11px; color: var(--ink-3); letter-spacing: 0.06em; text-transform: uppercase; }\n  .hero-meta .item b { display: block; font-family: \"Oswald\", sans-serif; font-size: 28px; color: var(--ink); font-weight: 600; letter-spacing: 0; text-transform: none; margin-bottom: 2px; line-height: 1; }\n  .hero-meta .item .blue { color: var(--navy); }\n\n  /* paint chip fan */\n  .chip-fan { position: relative; aspect-ratio: 1/1.05; }\n  .chip-fan .deck-base { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 64px; height: 24px; background: var(--ink); border-radius: 3px; z-index: 20; }\n  .chip-fan .deck-base::before { content: \"SEA-DECK 01\"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: \"Geist Mono\", monospace; font-size: 7px; color: var(--paper); letter-spacing: 0.1em; }\n  .chip { position: absolute; bottom: 18px; left: 50%; width: 92px; height: 320px; background: var(--ink); b
